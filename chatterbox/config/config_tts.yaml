GUI_config:
  online_phon_input: False
  # Fallback when the active TTS model's accepts_phoneme_input (below, per tts_models entry) is
  # False: "translate_labels" keeps the Phonemes keyboard usable, writing each key's already-
  # computed display label (e.g. "CH", "ON" -- ordinary French spelling) into the text field
  # instead of its raw phone code; "hide" removes the Texte/Phonemes toggle and keyboard entirely,
  # leaving only the Texte keyboard. See chatterbox/gui/app.py's _keyboard_emit().
  phoneme_fallback: "translate_labels"
  # App-bar "Langue" submenu (chatterbox/gui/app.py's create_gui()/_run_gui_session()): each
  # entry's own display name is shown untranslated (a language names itself, regardless of the
  # currently active locale -- "English" doesn't become "Anglais" when French is active).
  # Selecting one switches chatterbox/gui/i18n.py's locale AND reloads the window onto the first
  # tts_models[] entry whose own "language" field (below, per-model) matches that code.
  languages:
    - code: "fr"
      label: "Français"
    - code: "en"
      label: "English"
  main_panel:
    name_window: "TTS"
    add_audio_infos: True
    add_GST_infos: False
    add_play_button: True  # "repeat"/replay button -- was off by default; the fix for its crash-
                           # before-first-synthesis bug (Phase 3) is only useful if it's visible
    add_put_away_button: True  # sends put_away to chatterbox-powerd; no-op if powerd isn't running
    add_settings_button: True  # opens the power-settings screen (gui/settings.py)
    add_battery_info: True  # shows battery % from the DFRobot FIT0992 UPS HAT (chatterbox/power/
                             # battery.py); silently hidden if that hardware/smbus2 isn't present
    # width: 800
    width: 440
    height: 800
    input_width: 30
    control_width: 440
    control_height: 400
  add_keyboard: True
  detach_keyboard: False
  keyboard_options:
    name_window: "Keyboard"
    keys: "Emmanuelle"
    show_entry: True
    play_phone: False
    font_size: 12
    width: 350
    height: 250
    key_margin_x: 5  # Horizontal padding between keys
    key_margin_y: 5  # Vertical padding between keys
    max_button_width: 3 # Maximum button width (affects how wide the keyboard can get)
    # Startup layout for the Texte-mode soft keyboard's letter grid (chatterbox/gui/app.py's
    # _LETTER_LAYOUTS) -- live-switchable afterward via Settings -> Advanced, independent of
    # language ("qwerty" doesn't imply English, "azerty" doesn't imply French; a user can pick
    # either regardless of the active TTS language).
    letter_layout: "azerty"

# Post-processing: peak normalisation + feedforward soft limiter.
# Override at runtime with --postprocess / --no-postprocess --target-crest-db N --target-peak-dbfs N
postprocess:
  enabled: false          # safe default — preserves original behaviour
  target_crest_db: 14.0   # target active crest factor (dB); 14 dB ≈ typical broadcast speech
  target_peak_dbfs: -1.0  # final peak level (dBFS)
  analyze: false          # if true, also write .report.json and .report.png per synthesis

# Optional profiling subsystem: per-sentence timing + background PMIC/CPU/
# thermal sampling. Override at runtime with --profile or CHATTERBOX_PROFILE=1.
# See README.md "Profiling" for the output files and calibration procedure.
profiling:
  enabled: false        # safe default — zero overhead, no files written
  output_dir: "profile"
  sample_hz: 10          # sysfs (CPU/freq/temp/mem) sampling rate
  pmic_hz: 10            # vcgencmd pmic_read_adc rate; lower (e.g. 5) + interpolation
                         # if 10 Hz measurably perturbs synthesis timing
  core: 3                # CPU core the background sampler is pinned to
  niceness: 10           # background sampler os.nice() offset
  ina226: true           # auto-detect INA226 amp-branch monitor (i2c-1 @ 0x40);
                         # absent sensor just leaves ina_* columns empty, never an error

default_start_punctuation: "."
default_end_punctuation: "."
use_denoiser: True
visual_smoothing:
  activate: True
  cutoff: 5
subtitles:
  create_file: True
  duration_by_frame: 
    sampling_rate: 22050
    hop_length: 256
  max_nbr_char: 60

tts_models:
  - label: "Multi Speaker/Style"
    load_script: "load_fastspeech2"
    syn_script: "syn_fastspeech2"
    gui_script: "gui_generic_controls"
    folder: "assets/models/FastSpeech2"
    checkpoint_file: "390000"
    output_location: "output/audio"
    # This dict's order is chatterbox/gui/keyboards.py's mood-shortcut source of truth (":D"->3
    # ENTHOUSIASTE, ":("->1 DESOLE, ":p"->4 ESPIEGLE, ":O"->5 ETONNE, all hardcoded indices) -- keep
    # alphabetical/stable, don't reorder for display purposes. The GST chip grid no longer reads
    # this order directly for WHERE to draw each chip: gui/app.py's gui_generic_controls() sorts by
    # "is this default_args.gst_token_index" first (stable sort) so the default always renders at
    # grid position [0,0] regardless of its underlying index here (PC-GUI feedback) -- only the
    # chip's underlying value (unchanged, still this dict's index) has to stay put.
    gst_token_list: {
        "COLERE": 1.0,
        "DESOLE": 1.0,
        "DETERMINE": 1.0,
        "ENTHOUSIASTE": 1.0,
        "ESPIEGLE": 1.0,
        "ETONNE": 1.0,
        "EVIDENCE": 1.0,
        "INCREDULE": 1.0,
        "NEUTRE": 1.0,
        "PENSIF": 1.0,
        "RECONFORTANT": 1.0,
        "SUPPLIANT": 1.0,
        "TOKEN13": 1.0,
        "TOKEN14": 1.0,
        "TOKEN15": 1.0,
        "TOKEN16": 1.0,
    }
    gui_control_bias: False
    gui_style_control: True
    gui_styleTag_control: False
    # Static per-model capability flags (decidable before the model is loaded, unlike
    # describe_controls() -- see chatterbox/synthesis/base.py). needs_vocoder: whether a separate
    # vocoder_models entry must be selected/loaded for this TTS model (False for a monolithic
    # end-to-end model with no separate mel->wav stage -- gui/app.py's Settings->Advanced hides the
    # Vocodeur picker when False). accepts_phoneme_input: whether this model understands the
    # Phonemes keyboard's raw phone-code syntax at all (gui/app.py falls back per
    # GUI_config.phoneme_fallback above when False).
    needs_vocoder: True
    accepts_phoneme_input: True
    default_args:
      text_cleaners: ["basic_cleaners"]
      preprocess_config: "config/ALL_corpus/preprocess.yaml"
      model_config: "config/ALL_corpus/model.yaml"
      train_config: "config/ALL_corpus/train.yaml"
      vocoder: None
      speaker_id: 4
      mode: "single"
      pitch_control: 0.0
      energy_control: 0.0
      duration_control: 1.1
      duration_control_bias: 1.0
      pitch_control_bias: 0.0
      f1_control_bias: 0.0
      f2_control_bias: 0.0
      f3_control_bias: 0.0
      spectral_tilt_control_bias: 0.0
      energy_control_bias: 0.0
      relative_pos_control_bias: 0.0
      pfitzinger_control_bias: 0.0
      cog_control_bias: 0.0
      sb1k_control_bias: 0.0
      pause_control_bias: 0.0
      liaison_control_bias: 0.0
      silence_control_bias: False
      gst_token_index: 8  # NEUTRE -- gst_token_list's order is back to alphabetical/stable (see
                          # comment above); the chip grid draws whichever index this points to
                          # first regardless of its position in the list.
      style_intensity: 1.0
      enforce_linking_duration: True

  # Piper (fr_FR, piper-tts==1.5.0) -- monolithic text->wav backend, see
  # chatterbox/synthesis/backends/piper/backend.py and docs/context/CHANGELOG.md. "backend" is a
  # new per-entry field (chatterbox/synthesis/registry.py's _BackendProxy) telling cli.py/gui/
  # app.py which concrete backend class to activate before resolving load_script -- omitted
  # entirely on the FastSpeech2 entry above, which defaults to "fastspeech2_hifigan". All 3 Piper
  # voices share one output_location: only one is ever "active" at a time, same as FS2's single
  # model, so switching voices mid-session just overwrites the same audio_file.wav.
  # apply_custom_regex_rules defaults to false (opt-in): confirmed live during Phase B that
  # custom_regex_rules.csv/url_regex_rules.csv (rules/) are full of FS2's own "{phonetic}" bracket
  # syntax ("test" -> "{t e^ s t}", every URL rule, etc.) -- Piper's phonemizer has no notion of
  # that syntax and would mispronounce it as literal text. See
  # chatterbox/synthesis/backends/piper/text_frontend.py's module docstring.
  - label: "Piper fr_FR (siwis, medium)"
    backend: "piper"
    load_script: "load_piper"
    syn_script: "syn_piper"
    gui_script: "gui_generic_controls"
    folder: "assets/models/Piper"
    checkpoint_file: "fr_FR-siwis-medium.onnx"
    output_location: "output/audio"
    gst_token_list: {}
    needs_vocoder: false
    accepts_phoneme_input: false
    # audio_file_duration.npy (FastSpeech2's own per-symbol duration output, chatterbox/synth.py)
    # is not something Piper produces -- confirmed live via a real --benchmark --join run on the
    # Pi (docs/context/CHANGELOG.md), which crashed with FileNotFoundError before this flag
    # existed. False disables the subtitle-writing path for this model regardless of the
    # top-level subtitles.create_file setting.
    supports_subtitles: false
    default_args:
      length_scale: 1.0
      noise_scale: 0.667
      noise_w_scale: 0.8
      apply_custom_regex_rules: false

  - label: "Piper fr_FR (upmc, medium)"
    backend: "piper"
    load_script: "load_piper"
    syn_script: "syn_piper"
    gui_script: "gui_generic_controls"
    folder: "assets/models/Piper"
    checkpoint_file: "fr_FR-upmc-medium.onnx"
    output_location: "output/audio"
    gst_token_list: {}
    needs_vocoder: false
    accepts_phoneme_input: false
    # audio_file_duration.npy (FastSpeech2's own per-symbol duration output, chatterbox/synth.py)
    # is not something Piper produces -- confirmed live via a real --benchmark --join run on the
    # Pi (docs/context/CHANGELOG.md), which crashed with FileNotFoundError before this flag
    # existed. False disables the subtitle-writing path for this model regardless of the
    # top-level subtitles.create_file setting.
    supports_subtitles: false
    default_args:
      length_scale: 1.0
      noise_scale: 0.667
      noise_w_scale: 0.8
      apply_custom_regex_rules: false

  # "Piper fr_FR (tom, medium)" was removed after real-hardware evaluation (docs/context/
  # CHANGELOG.md): noticeably lower voice quality and slower inference than siwis/upmc, with no
  # offsetting benefit. assets/models/Piper/fr_FR-tom-medium.onnx(.json) removed too --
  # scripts/fetch_piper_voices.sh no longer fetches it.

  # First non-French voice: en_US, single speaker (Lessac dataset), medium quality -- same shape
  # as siwis (no speaker_id_map, same default_args values). "language" is a new per-entry field
  # (defaults to "fr" wherever read -- the FS2/siwis/upmc entries above don't need it) used by the
  # GUI's "Langue" menu (GUI_config.languages above) to pick which model a language switch loads.
  - label: "Piper en_US (lessac, medium)"
    backend: "piper"
    language: "en"
    load_script: "load_piper"
    syn_script: "syn_piper"
    gui_script: "gui_generic_controls"
    folder: "assets/models/Piper"
    checkpoint_file: "en_US-lessac-medium.onnx"
    output_location: "output/audio"
    gst_token_list: {}
    needs_vocoder: false
    accepts_phoneme_input: false
    supports_subtitles: false
    default_args:
      length_scale: 1.0
      noise_scale: 0.667
      noise_w_scale: 0.8
      apply_custom_regex_rules: false

vocoder_models:
  - label: "Hifi-GAN V2 FR 570000"
    load_script: "load_hifigan"
    syn_script: "syn_hifigan"
    folder: "assets/models/hifi-gan-master"
    checkpoint_file: "FR_V2/g_00570000"
    config_path: "FR_V2/config.json"
    output_location: "./"

